version: "3.9"

# ============================================================
# HARMONI — Docker Compose
# Usage:
#   Dev:  docker compose -f docker-compose.yml up
#   Prod: docker compose -f docker-compose.prod.yml up
# ============================================================

services:
  # ─── App ────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: harmoni_app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-harmoni}:${POSTGRES_PASSWORD:-harmoni_pass}@db:5432/${POSTGRES_DB:-harmoni_db}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-harmoni-files}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - harmoni_network
    volumes:
      - app_uploads:/app/public/uploads

  # ─── PostgreSQL ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: harmoni_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-harmoni}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-harmoni_pass}
      POSTGRES_DB: ${POSTGRES_DB:-harmoni_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-harmoni} -d ${POSTGRES_DB:-harmoni_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - harmoni_network

  # ─── Redis (for rate limiting & sessions) ───────────────
  redis:
    image: redis:7-alpine
    container_name: harmoni_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--auth", "${REDIS_PASSWORD:-redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - harmoni_network

  # ─── DB Migration (one-shot) ────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: harmoni_migrate
    command: ["npx", "prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-harmoni}:${POSTGRES_PASSWORD:-harmoni_pass}@db:5432/${POSTGRES_DB:-harmoni_db}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - harmoni_network
    profiles:
      - migrate

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_uploads:
    driver: local

networks:
  harmoni_network:
    driver: bridge
